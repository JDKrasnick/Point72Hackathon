engines:
  - engine_id: phased_engine_v1
    engine_name: Phased Engine
    strategy_name: Phase Implementation / Milestone Agents
    owner: Hyun-Dai
    uci_command: "python3 ../PhasedEngine/engine.py"
    language: Python
    frameworks: [python-chess]
    created_from_existing_foundation: false
    stockfish_derived: false
    enabled: true
    notes: "Built in phases: move gen, evaluation, search, time management."

  - engine_id: single_shot_v1
    engine_name: Single Shot Engine
    strategy_name: Single Shot
    owner: ""
    uci_command: "python3 ../Single-Shot/engine.py"
    language: Python
    frameworks: [python-chess]
    created_from_existing_foundation: false
    stockfish_derived: false
    enabled: true
    notes: "One prompt, one response, no iteration."

  - engine_id: stockfish_replica_v1
    engine_name: HyperKnight (Stockfish Replica)
    strategy_name: Copy Stockfish to a Tee
    owner: Hyun-Dai
    uci_command: "../StockfishReplica/ChessEngine/hyperknight"
    language: C++
    frameworks: []
    created_from_existing_foundation: false
    stockfish_derived: true
    enabled: true
    max_search_depth: 5
    notes: "C++ engine modelled closely on Stockfish architecture. Segfaults at depth 6+; capped at depth 5."
